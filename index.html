<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botequim</title>
    <meta name="theme-color" content="#243447">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #243447; color: #e0e0e0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background: #1e1e1e; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .btn-accent { background: #ff9800; color: #000; font-weight: bold; }
        input { background: #2d2d2d !important; border: 1px solid #444 !important; color: white !important; outline: none; }
        
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        input[type="checkbox"] { accent-color: #ff9800; width: 1.5rem; height: 1.5rem; }
        
        .btn-qty { border: 1px solid #444; padding: 2px 10px; border-radius: 6px; font-weight: bold; font-size: 1.2rem; min-width: 35px; }
        .btn-plus { color: #ff9800; border-color: #ff9800; }
        .btn-minus { color: #888; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto">

<header class="text-left mb-6 px-1">
    <h1 class="flex items-center text-3xl font-bold text-orange-500 italic tracking-tighter">
        Botequim <img src="icon.png" alt="Logo" class="h-12 w-12 ml-3 object-contain">
    </h1>
</header>

    <div id="main-container">
        <div class="card p-5 mb-4 border-l-4 border-orange-500">
            <div class="flex justify-between items-center mb-4 gap-2">
                <div class="flex items-center gap-2 flex-1">
                    <h3 class="text-lg text-white tracking-wide text-orange-200 font-bold whitespace-nowrap">Baron</h3>
                    <input id="bar-name" type="text" placeholder="Nome do Bar" 
                           oninput="updateBarName()" 
                           onkeypress="if(event.key==='Enter') document.getElementById('in-name').focus()"
                           class="bg-transparent !border-none !p-0 text-sm text-gray-400 placeholder-gray-700 w-full outline-none focus:text-orange-300">
                </div>
                <button onclick="clearItems()" class="text-red-500 text-[10px] font-bold border border-red-900/50 px-2 py-1 rounded whitespace-nowrap">LIMPAR CONTA</button>
            </div>
            
            <div id="items-list" class="space-y-3 mb-6"></div>

            <div class="grid grid-cols-12 gap-2 mb-4">
                <input id="in-name" type="text" placeholder="Item" class="col-span-5 text-sm p-2 rounded enter-submit">
                <input id="in-qty" type="number" inputmode="numeric" placeholder="Qt" class="col-span-2 text-sm p-2 rounded text-center enter-submit">
                <input id="in-price" type="number" inputmode="decimal" step="0.01" placeholder="R$" class="col-span-3 text-sm p-2 rounded text-center enter-submit">
                <button onclick="addItem()" class="col-span-2 btn-accent rounded font-bold text-xl">+</button>
            </div>

            <div class="flex items-center justify-between p-3 bg-[#2d2d2d] rounded-lg">
                <div class="flex items-center gap-2">
                    <span class="text-gray-400 text-sm">Couvert: R$</span>
                    <input id="in-couvert" type="number" inputmode="decimal" value="0" onchange="updateCalculos()" class="w-16 p-1 rounded text-center font-bold text-sm">
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-gray-400 text-sm">10%:</span>
                    <input id="in-tip" type="checkbox" checked onchange="updateCalculos()">
                </div>
            </div>
        </div>
    </div>

    <div class="card p-5 border-t-4 border-orange-500 bg-gradient-to-b from-[#1e1e1e] to-[#252525]">
        <h2 id="resumo-titulo" class="text-xs font-bold mb-3 text-gray-500 uppercase tracking-widest">Resumo detalhado</h2>
        <div class="space-y-1 border-b border-gray-700 pb-3 mb-3">
            <div class="flex justify-between text-sm text-gray-300"><span>Consumo:</span> <span id="res-items">R$ 0,00</span></div>
            <div class="flex justify-between text-sm text-gray-300"><span>Couvert:</span> <span id="res-items-couvert">R$ 0,00</span></div>
            <div class="flex justify-between text-sm text-gray-300"><span>Gorjeta (10%):</span> <span id="res-tip">R$ 0,00</span></div>
        </div>
        <div class="flex justify-between items-center">
            <span class="text-xl font-bold">TOTAL:</span>
            <span id="grand-total" class="text-3xl font-black text-orange-500">R$ 0,00</span>
        </div>
    </div>

    <script>
        let consumption = JSON.parse(localStorage.getItem('botequim_baron')) || [];

        document.querySelectorAll('.enter-submit').forEach(input => {
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') addItem();
            });
        });

        function updateBarName() {
            const barName = document.getElementById('bar-name').value;
            localStorage.setItem('botequim_bar_name', barName);
            const titulo = document.getElementById('resumo-titulo');
            titulo.innerText = barName ? `Resumo detalhado - ${barName}` : 'Resumo detalhado';
        }

        function loadBarName() {
            const savedBar = localStorage.getItem('botequim_bar_name');
            if (savedBar) {
                document.getElementById('bar-name').value = savedBar;
                updateBarName();
            }
        }

        function updateCalculos() {
            const list = document.getElementById('items-list');
            const couvert = parseFloat(document.getElementById('in-couvert').value) || 0;
            const hasTip = document.getElementById('in-tip').checked;
            
            list.innerHTML = '';
            let subtotalItems = 0;

            consumption.forEach((item, idx) => {
                const totalRow = item.qty * item.price;
                subtotalItems += totalRow;
                const unitPriceDisplay = item.qty > 1 
                    ? `<div class="text-[10px] text-gray-400 italic">un: R$ ${item.price.toFixed(2)}</div>` 
                    : '';

                list.innerHTML += `
                    <div class="flex justify-between items-center bg-black/30 p-2 rounded-lg border border-gray-800">
                        <div class="w-2/5 truncate leading-tight">
                           <div class="text-[10px] text-gray-500 uppercase font-bold">Item</div>
                           <div class="text-sm font-medium"><span class="text-orange-500 font-bold">${item.qty}x</span> ${item.name}</div>
                        </div>
                        <div class="flex items-center gap-2 w-3/5 justify-end">
                            <div class="text-right mr-1">
                                <div class="font-bold text-sm text-white">R$ ${totalRow.toFixed(2)}</div>
                                ${unitPriceDisplay}
                            </div>
                            <button onclick="decrementItem(${idx})" class="btn-qty btn-minus">-</button>
                            <button onclick="incrementItem(${idx})" class="btn-qty btn-plus">+</button>
                        </div>
                    </div>
                `;
            });

            const tipValue = hasTip ? (subtotalItems * 0.10) : 0;
            const finalTotal = subtotalItems + couvert + tipValue;

            document.getElementById('res-items').innerText = `R$ ${subtotalItems.toFixed(2)}`;
            document.getElementById('res-items-couvert').innerText = `R$ ${couvert.toFixed(2)}`;
            document.getElementById('res-tip').innerText = `R$ ${tipValue.toFixed(2)}`;
            document.getElementById('grand-total').innerText = `R$ ${finalTotal.toFixed(2)}`;

            localStorage.setItem('botequim_baron', JSON.stringify(consumption));
        }

        function addItem() {
            const nameEl = document.getElementById('in-name');
            const qtyEl = document.getElementById('in-qty');
            const priceEl = document.getElementById('in-price');

            const name = nameEl.value;
            const qty = parseFloat(qtyEl.value) || 1;
            const price = parseFloat(priceEl.value) || 0;

            if (name && price > 0) {
                consumption.push({ name, qty, price });
                nameEl.value = ''; qtyEl.value = ''; priceEl.value = '';
                nameEl.focus(); 
                updateCalculos();
            }
        }

        function incrementItem(idx) { consumption[idx].qty += 1; updateCalculos(); }
        function decrementItem(idx) {
            if (consumption[idx].qty > 1) consumption[idx].qty -= 1;
            else consumption.splice(idx, 1);
            updateCalculos();
        }

        function clearItems() {
            if(confirm("Deseja zerar toda a conta do Baron?")) {
                consumption = [];
                document.getElementById('in-couvert').value = 0;
                
                // Limpa o campo do nome do bar visualmente e no LocalStorage
                const barInput = document.getElementById('bar-name');
                barInput.value = ''; 
                localStorage.removeItem('botequim_bar_name');
                
                // Atualiza o título do resumo e os cálculos
                updateBarName();
                updateCalculos();
            }
        }

        loadBarName();
        updateCalculos();
    </script>
</body>
</html>
